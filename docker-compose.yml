services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: marathon-backend
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 10s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: marathon-frontend
    ports:
      - "8092:80"
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: marathon-network
