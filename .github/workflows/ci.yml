name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pre-commit hooks
        run: |
          pre-commit run --all-files

      - name: Run Ruff (Linting & Formatting)
        run: |
          cd backend
          ruff check .
          ruff format --check .

      - name: Run Mypy (Type Checking)
        run: |
          cd backend
          PYTHONPATH=src mypy src

      - name: Run Unit Tests
        run: |
          cd backend
          PYTHONPATH=src pytest

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Lint
        run: |
          cd frontend
          npm run lint

  docker-build:
    needs: [backend-tests, frontend-lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Backend Image
        run: |
          docker build -t marathon-model-backend ./backend

      - name: Build Frontend Image
        run: |
          docker build -t marathon-model-frontend ./frontend
