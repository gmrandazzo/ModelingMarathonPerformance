name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pre-commit hooks
        run: |
          pre-commit run --all-files

      - name: Run Ruff (Linting & Formatting)
        run: |
          cd backend
          ruff check .
          ruff format --check .

      - name: Run Mypy (Type Checking)
        run: |
          cd backend
          PYTHONPATH=src mypy src

      - name: Run Unit Tests
        run: |
          cd backend
          PYTHONPATH=src pytest

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Lint
        run: |
          cd frontend
          npm run lint

  docker-build:
    needs: [backend-tests, frontend-lint]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend Image
        run: |
          IMAGE_ID=ghcr.io/${{ github.repository_owner }}/marathon-model-backend
          # Convert image ID to lowercase
          IMAGE_ID=$(echo $IMAGE_ID | tr '[A-Z]' '[a-z]')
          
          docker build -t $IMAGE_ID:latest ./backend
          
          # Only push on main/master branches, not on PRs
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            docker push $IMAGE_ID:latest
          fi

      - name: Build and push Frontend Image
        run: |
          IMAGE_ID=ghcr.io/${{ github.repository_owner }}/marathon-model-frontend
          # Convert image ID to lowercase
          IMAGE_ID=$(echo $IMAGE_ID | tr '[A-Z]' '[a-z]')
          
          docker build -t $IMAGE_ID:latest ./frontend
          
          # Only push on main/master branches, not on PRs
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            docker push $IMAGE_ID:latest
          fi
